name: 4. Docker — збірка контейнера

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  docker-build:
    name: Збірка та перевірка Docker-образу
    runs-on: ubuntu-latest

    steps:
      - name: Клонування репозиторію
        uses: actions/checkout@v4

      - name: Налаштування Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Збірка Docker-образу
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: atestation-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Перевірка запуску контейнера
        run: docker run --rm atestation-app:latest

      - name: Інформація про образ
        run: docker images atestation-app:latest
