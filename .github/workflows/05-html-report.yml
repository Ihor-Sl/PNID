name: 5. HTML-звіт — автоматичний звіт тестів

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-report:
    name: Генерація HTML-звіту
    runs-on: ubuntu-latest

    steps:
      - name: Клонування репозиторію
        uses: actions/checkout@v4

      - name: Встановлення Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Встановлення залежностей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Запуск тестів з HTML-звітом і покриттям
        run: |
          mkdir -p public
          pytest --html=public/index.html --self-contained-html \
                 --cov=src --cov-report=html:public/coverage

      - name: Збереження звіту як артефакт
        uses: actions/upload-artifact@v4
        with:
          name: html-report
          path: public/
          retention-days: 30

      - name: Підготовка для GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy-pages:
    name: Публікація звіту на GitHub Pages
    needs: generate-report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Розгортання на GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
