name: 2. Lint — перевірка стилю коду

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint:
    name: flake8 + black
    runs-on: ubuntu-latest

    steps:
      - name: Клонування репозиторію
        uses: actions/checkout@v4

      - name: Встановлення Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Встановлення інструментів лінтингу
        run: |
          python -m pip install --upgrade pip
          pip install flake8==7.1.1 black==24.10.0

      - name: Перевірка flake8
        run: flake8 src tests main.py

      - name: Перевірка black (тільки перевірка, без змін)
        run: black --check src tests main.py
